name: Test target-linear

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:
    inputs: {}

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      PIP_CONSTRAINT: .github/workflows/constraints.txt
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Poetry
      run: |
        pip install pip
        pip install poetry
        poetry --version

    - name: Install dependencies
      run: poetry install

    # The suite is fully mocked, so no Linear credentials are needed or wanted here.
    - name: Run pytest
      run: poetry run pytest

    - name: Run ruff
      run: poetry run ruff check target_linear tests

    - name: Check formatting
      run: poetry run ruff format --check target_linear tests
